name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_APP_BASE_PATH: /sports-data-admin
        run: npm run build

      - name: Verify Docker image
        run: |
          docker build -t scrapper-admin-ui:ci \
            --build-arg VITE_APP_BASE_PATH=/sports-data-admin \
            --build-arg APP_BASE_PATH=/sports-data-admin \
            .
          docker run --rm --entrypoint sh scrapper-admin-ui:ci -c \
            'test -f /app/server.mjs && test -f /app/dist/index.html'
          CID=$(docker run -d \
            -e APP_BASE_PATH=/sports-data-admin \
            -e SCRAPPER_UPSTREAM=http://127.0.0.1:9 \
            -e ADMIN_UI_API_KEY=ci-ui \
            -e SCRAPPER_ADMIN_API_KEY=ci-scraper \
            scrapper-admin-ui:ci)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 30); do
            if docker exec "$CID" node -e "fetch('http://127.0.0.1/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              docker exec "$CID" node -e "fetch('http://127.0.0.1/sports-data-admin/').then(r=>r.text()).then(t=>process.exit(t.includes('__SCRAPPER_ADMIN_CONFIG__')&&t.includes('/sports-data-admin/api')?0:1)).catch(()=>process.exit(1))"
              docker exec "$CID" node -e "fetch('http://127.0.0.1/sports-data-admin/api/admin/v1/health/detail').then(r=>process.exit(r.status===401?0:1)).catch(()=>process.exit(1))"
              docker exec "$CID" node -e "fetch('http://127.0.0.1/sports-data-admin/api/admin/v1/health/detail',{headers:{Authorization:'Bearer ci-ui'}}).then(r=>process.exit(r.status===502?0:1)).catch(()=>process.exit(1))"
              exit 0
            fi
            sleep 1
          done
          docker logs "$CID" 2>&1 | tail -30
          exit 1
