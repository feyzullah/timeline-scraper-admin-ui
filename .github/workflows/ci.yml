name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_SCRAPPER_API_BASE_URL: /scrapper-api
        run: npm run build

      - name: Verify Docker image
        run: |
          docker build -t scrapper-admin-ui:ci --build-arg CACHEBUST=${{ github.sha }} .
          docker run --rm --entrypoint sh scrapper-admin-ui:ci -c \
            'test -x /docker-entrypoint.sh && test -x /docker-entrypoint.d/99-scrapper-proxy-config.sh && test -f /etc/nginx/scrapper/default.conf.template'
          CID=$(docker run -d -e SCRAPPER_UPSTREAM=http://127.0.0.1:9 -e SCRAPPER_ADMIN_API_KEY=ci scrapper-admin-ui:ci)
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 30); do
            if docker exec "$CID" wget -qO- http://127.0.0.1/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$CID" 2>&1 | tail -30
          exit 1
