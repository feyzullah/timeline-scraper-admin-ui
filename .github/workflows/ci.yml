name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_SCRAPPER_API_BASE_URL: /scrapper-api
        run: npm run build

      - name: Verify Docker image
        run: |
          docker build -t scrapper-admin-ui:ci .
          docker run --rm --entrypoint sh scrapper-admin-ui:ci -c \
            'test -x /docker-entrypoint.d/99-scrapper-proxy-config.sh && test -f /etc/nginx/scrapper/default.conf.template'
