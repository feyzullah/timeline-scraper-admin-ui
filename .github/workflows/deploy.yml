name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: k3s
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        env:
          IMAGE: ${{ secrets.REGISTRY_URL }}/scrapper-admin-ui
        run: |
          docker build \
            --build-arg VITE_APP_BASE_PATH=/sports-data-admin \
            --build-arg APP_BASE_PATH=/sports-data-admin \
            -t "$IMAGE:sha-${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:sha-${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Verify image starts
        env:
          IMAGE: ${{ secrets.REGISTRY_URL }}/scrapper-admin-ui:sha-${{ github.sha }}
        run: |
          docker pull "$IMAGE"
          docker run --rm --entrypoint sh "$IMAGE" -c \
            'test -f /app/server.mjs && test -f /app/dist/index.html'
          CID=$(docker run -d \
            -e APP_BASE_PATH=/sports-data-admin \
            -e SCRAPPER_UPSTREAM=http://127.0.0.1:9 \
            "$IMAGE")
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 30); do
            if docker exec "$CID" node -e "fetch('http://127.0.0.1/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$CID" 2>&1 | tail -30
          exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: k3s

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy
        env:
          IMAGE: ${{ secrets.REGISTRY_URL }}/scrapper-admin-ui:sha-${{ github.sha }}
        run: |
          kubectl set image deployment/timeline-scraper-admin-ui \
            timeline-scraper-admin-ui="$IMAGE" \
            -n timeline-scraper
          kubectl rollout status deployment/timeline-scraper-admin-ui \
            -n timeline-scraper --timeout=120s

      - name: Show running image
        run: |
          kubectl get deployment timeline-scraper-admin-ui -n timeline-scraper \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
