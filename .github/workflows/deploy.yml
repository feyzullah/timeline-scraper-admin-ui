name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: k3s
    permissions:
      contents: read

    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      image: ${{ steps.tag.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tag
        id: tag
        run: |
          TAG="sha-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.REGISTRY_URL }}/scrapper-admin-ui" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_SCRAPPER_API_BASE_URL=/scrapper-api
            VITE_SCRAPPER_ADMIN_API_KEY=
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:latest

      - name: Verify image starts
        run: |
          IMAGE="${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}"
          docker pull "$IMAGE"
          docker run --rm --entrypoint sh "$IMAGE" -c \
            'test -f /app/server.mjs && test -f /app/dist/index.html'
          CID=$(docker run -d -e SCRAPPER_UPSTREAM=http://127.0.0.1:9 -e SCRAPPER_ADMIN_API_KEY=ci "$IMAGE")
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 30); do
            if docker exec "$CID" node -e "fetch('http://127.0.0.1/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$CID" 2>&1 | tail -30
          exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: k3s

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace
        run: kubectl create namespace timeline-scraper --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync registry pull secret
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          kubectl create secret docker-registry registry-pull-secret \
            --docker-server="${{ secrets.REGISTRY_URL }}" \
            --docker-username="${{ secrets.REGISTRY_USERNAME }}" \
            --docker-password="$REGISTRY_PASSWORD" \
            --namespace=timeline-scraper \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        env:
          IMAGE_TAG: ${{ secrets.REGISTRY_URL }}/scrapper-admin-ui:${{ needs.build.outputs.tag }}
        run: |
          envsubst '${IMAGE_TAG}' < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml -n timeline-scraper
          kubectl rollout restart deployment/scrapper-admin-ui -n timeline-scraper

      - name: Wait for rollout
        run: kubectl rollout status deployment/scrapper-admin-ui -n timeline-scraper --timeout=300s

      - name: Show running image
        run: |
          kubectl get deployment scrapper-admin-ui -n timeline-scraper -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
          kubectl get pods -n timeline-scraper -l app=scrapper-admin-ui -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].image}{"\t"}{.status.containerStatuses[0].state.waiting.reason}{"\n"}{end}'
