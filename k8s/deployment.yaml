apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapper-admin-ui
  namespace: timeline-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scrapper-admin-ui
  template:
    metadata:
      labels:
        app: scrapper-admin-ui
    spec:
      imagePullSecrets:
        - name: registry-pull-secret

      containers:
        - name: scrapper-admin-ui
          image: ${IMAGE_TAG}
          ports:
            - containerPort: 80

          # Secret `timeline-scraper-admin-ui-env` — see k8s/timeline-scraper-admin-ui-env.example
          envFrom:
            - secretRef:
                name: timeline-scraper-admin-ui-env

          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
