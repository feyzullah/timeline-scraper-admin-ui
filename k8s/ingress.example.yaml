# Optional — expose admin UI outside the cluster (adjust host + ingress class).
# Apply after Service is up: kubectl apply -f k8s/ingress.example.yaml -n timeline-scraper
#
# UI is mounted at /sports-data-admin (see VITE_APP_BASE_PATH / APP_BASE_PATH).
# API: same-origin /sports-data-admin/scrapper-api (Node proxy in the UI pod).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scrapper-admin-ui
  namespace: timeline-scraper
spec:
  ingressClassName: traefik
  rules:
    - host: scrapper-admin.example.com
      http:
        paths:
          - path: /sports-data-admin
            pathType: Prefix
            backend:
              service:
                name: scrapper-admin-ui
                port:
                  number: 80
